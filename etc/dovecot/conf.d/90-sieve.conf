plugin {

  sieve_before = /var/mail/vmail/sieve/global/spam-global.sieve
  sieve = file:/var/mail/vhosts/%d/%n/sieve/scripts;active=/var/mail/vhosts/%d/%n/sieve/active-script.sieve
  # IMAPSieve + extprograms
  sieve_plugins = sieve_imapsieve sieve_extprograms
  sieve_global_extensions = +vnd.dovecot.pipe +vnd.dovecot.environment
  sieve_pipe_bin_dir = /usr/bin

  # Learn_spam in Spam/Junk
  imapsieve_mailbox1_name = Spam
  imapsieve_mailbox1_causes = COPY APPEND
  imapsieve_mailbox1_before = file:/var/mail/vhosts/sieve-global/report-spam.sieve


  # Learn_ham from Spam/Junk
  imapsieve_mailbox2_name = *
  imapsieve_mailbox2_from = Spam
  imapsieve_mailbox2_causes = COPY APPEND
  imapsieve_mailbox2_before = file:/var/mail/vhosts/sieve-global/report-ham.sieve

}
